---
- name: Forcefully stop and disable k3s services
  hosts: all
  become: yes
  tasks:
    # This block stops the main k3s server on the master node
    - name: Stop and disable k3s server service
      ansible.builtin.systemd:
        name: k3s.service
        state: stopped
        enabled: no
      # This task only runs on hosts that are in the 'masters' group
      when: "'masters' in group_names"
      # We ignore errors because the service might not exist on all hosts
      ignore_errors: yes

    # This block stops the k3s agent on the worker nodes
    - name: Stop and disable k3s agent service
      ansible.builtin.systemd:
        name: k3s-agent.service
        state: stopped
        enabled: no
      # This task only runs on hosts that are in the 'workers' group
      when: "'workers' in group_names"
      ignore_errors: yes

- name: Clean up k3s files and directories
  hosts: all
  become: yes
  tasks:
    - name: Remove k3s-related directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/rancher
        - /var/lib/rancher
        - /var/lib/kubelet
        - /usr/local/bin/k3s # This is the main binary

    - name: Kill any remaining k3s or containerd processes by pattern
      ansible.builtin.command: "pkill -f 'k3s|containerd'"
      # This command reports a change even if it does nothing, so we fix that.
      changed_when: false
      # This ensures the playbook doesn't fail if no processes are found to kill.
      failed_when: false

- name: Deep clean container runtime state
  hosts: all
  become: yes
  tasks:
    - name: Stop containerd service
      ansible.builtin.systemd:
        name: containerd.service
        state: stopped
      # We ignore errors in case k3s wasn't installed or already cleaned up containerd
      ignore_errors: yes

    - name: Remove containerd state directory to wipe all images/containers
      ansible.builtin.file:
        path: /var/lib/containerd
        state: absent
      ignore_errors: yes
