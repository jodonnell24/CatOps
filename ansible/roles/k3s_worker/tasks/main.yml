---
- name: Announce Worker Setup
  ansible.builtin.debug:
    msg: "Starting k3s worker node installation on {{ inventory_hostname }}"

- name: Install or reconfigure k3s agent on the worker node
  ansible.builtin.shell: >
    curl -sfL https://get.k3s.io |
    K3S_URL="https://{{ hostvars[groups['k3s_master'][0]]['ansible_host'] | default(groups['k3s_master'][0]) }}:6443"
    K3S_TOKEN="{{ hostvars[groups['k3s_master'][0]]['k3s_token'] }}"
    sh -
  no_log: true
  # We removed 'args: creates:' here. The k3s install script is smart.
  # If k3s is already installed, this command will just re-configure the agent
  # with the correct token from the master, effectively repairing it.

- name: Ensure the k3s-agent service is running on the worker
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: yes

- name: Announce Worker Completion
  ansible.builtin.debug:
    msg: "k3s worker node has successfully joined/re-configured."
