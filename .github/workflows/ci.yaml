name: Build, Push, and Update Helm Image

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "kubernetes/my-app-chart/values.yaml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/catops
          tags: |
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install yq
        run: |
          mkdir -p "$HOME/bin"
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O "$HOME/bin/yq"
          chmod +x "$HOME/bin/yq"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Update Helm image tag
        run: |
          yq e '.image.tag = "${{ steps.meta.outputs.version }}"' -i 'kubernetes/my-app-chart/values.yaml'

      - name: Commit manifest update
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add kubernetes/my-app-chart/values.yaml
          if git diff --quiet && git diff --staged --quiet; then
            echo "No image tag update needed."
          else
            git commit -m "ci: update image tag to ${{ steps.meta.outputs.version }}"
            git push
          fi
