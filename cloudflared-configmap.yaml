apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: default
data:
  config.yaml: |
    tunnel: 00000000-0000-0000-0000-000000000000
    credentials-file: /etc/cloudflared/token
    metrics: 0.0.0.0:2000
    ingress:
      - hostname: argo.example.com
        service: https://argocd-server.argocd.svc:443
        originRequest:
          noTLSVerify: true
      - hostname: vault.example.com
        service: http://vault.vault.svc:8200
      - service: http_status:404
