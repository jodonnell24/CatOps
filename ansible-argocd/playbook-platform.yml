## FILE: playbook-platform.yml
# --------------------
# The master playbook. Third time's the charm.
---
- name: Bootstrap Full Application Platform
  hosts: local
  gather_facts: no
  vars:
    vault_namespace: vault
    argocd_namespace: argocd
    vault_token: "{{ lookup('env', 'VAULT_TOKEN') }}"

  tasks:
    # --- Vault Installation (Manual Manifests) ---
    - name: Ensure Vault namespace exists
      kubernetes.core.k8s:
        name: "{{ vault_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: "Apply Vault Deployment manifest"
      kubernetes.core.k8s:
        state: present
        src: files/vault-deployment.yaml

    - name: "Apply Vault Service manifest"
      kubernetes.core.k8s:
        state: present
        src: files/vault-service.yaml

    - name: Wait for Vault pod to be running
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ vault_namespace }}"
        label_selectors:
          - "app=vault"
      register: vault_pod_status
      until: "vault_pod_status.resources[0].status.phase == 'Running'"
      retries: 30
      delay: 10

    # --- Argo CD Installation (Stays the same) ---
    - name: Ensure Argo CD namespace exists
      kubernetes.core.k8s:
        name: "{{ argocd_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Apply Argo CD installation manifest
      kubernetes.core.k8s:
        state: present
        src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        namespace: "{{ argocd_namespace }}"

    - name: Wait for Argo CD server to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ argocd_namespace }}"
        name: argocd-server
      register: argocd_deployment_status
      until: "argocd_deployment_status.resources[0].status.readyReplicas is defined and argocd_deployment_status.resources[0].status.readyReplicas > 0"
      retries: 30
      delay: 10

    # --- Secret Management ---
    - name: Get the Argo CD admin password
      ansible.builtin.shell: >
        kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret
        -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false
      no_log: true

    - name: Require Vault token from environment
      ansible.builtin.assert:
        that:
          - vault_token | length > 0
        fail_msg: "Set VAULT_TOKEN before storing Argo CD credentials in Vault."

    - name: Store Argo CD password in Vault
      ansible.builtin.shell: >
        kubectl exec -n {{ vault_namespace }} deployment/vault --
        env VAULT_ADDR='http://127.0.0.1:8200' VAULT_TOKEN='{{ vault_token }}'
        vault kv put secret/argocd password="{{ argocd_password.stdout }}"
      changed_when: false
      no_log: true

    - name: Apply the CatOps application manifest
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: catops-app
            namespace: "{{ argocd_namespace }}"
          spec:
            project: default
            source:
              repoURL: https://github.com/jodonnell24/catops.git
              path: kubernetes/my-app-chart
              targetRevision: main
            destination:
              server: https://kubernetes.default.svc
              namespace: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    - name: Display final instructions
      ansible.builtin.debug:
        msg:
          - "------------------------------------------------------------------"
          - "SUCCESS: Platform Bootstrap Complete."
          - "Vault is installed directly from manifests."
          - "The Argo CD admin password has been written to Vault at 'secret/argocd'."
          - "Next step: Configure OIDC or an external secret manager for CI/CD access."
          - "------------------------------------------------------------------"
