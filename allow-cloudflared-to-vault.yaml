apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-to-vault
  namespace: vault # <-- Policy goes in the 'vault' namespace
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault # <-- Check your Vault pod's labels to be sure!
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          app: cloudflared
    ports:
    - protocol: TCP
      port: 8200 # <-- Vault's port
