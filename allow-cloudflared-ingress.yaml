apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-to-argocd-server
  namespace: argocd  # <-- IMPORTANT: This policy goes in the 'argocd' namespace
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server # <-- This selects the Argo CD server pod
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {} #<-- This allows from ANY namespace...
      podSelector:
        matchLabels:
          app: cloudflared # <-- ...as long as the pod has this label
    ports:
    - protocol: TCP
      port: 443
